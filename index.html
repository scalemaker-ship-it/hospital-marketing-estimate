<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비범한 사람들 · 병원마케팅 협업용 견적서</title>
    <meta name="description" content="비범한 사람들 병원마케팅 협업 제안 견적서 · 서비스 항목 및 단가 안내 (부가세 별도)">
    <meta name="theme-color" content="#312e81">
    <meta property="og:type" content="website">
    <meta property="og:title" content="비범한 사람들 · 병원마케팅 협업용 견적서">
    <meta property="og:description" content="병원마케팅 서비스 항목 및 단가 안내 · 부가세 별도">
    <meta name="twitter:card" content="summary">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f1f5f9;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        @media print {
            @page { margin: 10mm; size: A4; }
            body { background-color: white; -webkit-print-color-adjust: exact; padding: 0; margin: 0; display: block !important; height: auto !important; overflow: visible !important; }
            .no-print { display: none !important; }
            .layout-container { display: block !important; width: 100% !important; max-width: 100% !important; padding: 0 !important; gap: 0 !important; height: auto !important; overflow: visible !important;}
            .left-panel { display: none !important; }
            .right-panel { width: 100% !important; max-width: 100% !important; box-shadow: none !important; margin: 0 !important; border: none !important; height: auto !important; overflow: visible !important;}
            .print-shadow-none { box-shadow: none !important; }
            input { border: none !important; background: transparent !important; padding: 0 !important; box-shadow: none !important; }
            input:focus { outline: none !important; ring: 0 !important; }
            td.action-col, th.action-col { display: none !important; }
            .page-break-always { page-break-before: always !important; break-before: page !important; }
        }
    </style>
</head>
<body class="min-h-screen flex justify-center py-6 px-4 md:px-8">

    <div class="layout-container w-full max-w-[1400px] flex flex-col lg:flex-row gap-6 lg:h-[calc(100vh-3rem)]">

        <!-- 좌측 패널: 서비스 선택 -->
        <div class="left-panel no-print w-full lg:w-5/12 xl:w-1/3 bg-white rounded-xl shadow-md border border-slate-200 flex flex-col lg:h-full lg:overflow-hidden">
            <div class="bg-indigo-900 text-white p-5 shrink-0">
                <h2 class="text-xl font-bold">서비스 항목 선택 <span class="text-xs font-normal bg-emerald-500 text-white px-2 py-0.5 rounded ml-1 align-middle">협업용</span></h2>
                <p class="text-sm text-indigo-200 mt-1">항목을 체크하면 우측 견적서에 자동 추가됩니다.</p>
            </div>

            <div class="flex-1 overflow-y-auto p-0 max-h-[55vh] lg:max-h-none" id="service-catalog"></div>

            <div class="bg-slate-50 p-5 border-t border-slate-200 shrink-0">
                <h3 class="font-bold text-slate-700 text-sm mb-3">인쇄 첨부파일 <span class="text-xs font-normal text-slate-500">(PDF 뒤에 추가됨)</span></h3>
                <div class="space-y-3 text-sm">
                    <div>
                        <label class="block text-slate-600 mb-1 text-xs font-semibold">사업자등록증 첨부</label>
                        <input type="file" accept="image/*" class="w-full text-xs border border-slate-300 rounded bg-white cursor-pointer" onchange="previewImage(this, 'biz')">
                    </div>
                    <div>
                        <label class="block text-slate-600 mb-1 text-xs font-semibold">통장사본 첨부</label>
                        <input type="file" accept="image/*" class="w-full text-xs border border-slate-300 rounded bg-white cursor-pointer" onchange="previewImage(this, 'bank')">
                    </div>
                </div>
            </div>
        </div>

        <div class="right-panel w-full lg:w-7/12 xl:w-2/3 bg-white rounded-xl shadow-lg border border-slate-200 p-5 sm:p-8 lg:p-10 flex flex-col lg:h-full lg:overflow-y-auto">

            <!-- 견적서 헤더 -->
            <header class="flex flex-wrap gap-3 justify-between items-end border-b-4 border-indigo-600 pb-6 mb-6 shrink-0">
                <div>
                    <h1 class="text-2xl sm:text-3xl md:text-4xl font-bold text-gray-900 tracking-tight">견적서 <span class="text-base sm:text-lg md:text-xl text-emerald-600 font-semibold ml-2">협업용</span></h1>
                    <p class="text-slate-500 text-sm mt-2">병원마케팅 협업 제안 견적 <span class="text-slate-400">· 모든 단가 부가세 별도</span></p>
                </div>
                <div class="text-right">
                    <p id="current-date" class="text-gray-500 text-sm mb-1"></p>
                    <p class="text-xl font-bold text-gray-900">비범한 사람들</p>
                </div>
            </header>

            <!-- 수신 및 견적명 입력 영역 -->
            <div class="flex flex-col gap-3 mb-6 text-gray-800 shrink-0">
                <div class="flex items-center gap-1">
                    <span class="font-bold w-16 sm:w-24 shrink-0 text-base sm:text-lg">수신 :</span>
                    <input type="text" class="flex-1 min-w-0 text-base sm:text-lg bg-transparent border-b border-gray-300 focus:border-indigo-600 focus:outline-none py-1 px-2 transition-colors" placeholder="수신처 (병원/담당자)">
                </div>
                <div class="flex items-center gap-1">
                    <span class="font-bold w-16 sm:w-24 shrink-0 text-base sm:text-lg">견적명 :</span>
                    <input type="text" class="flex-1 min-w-0 text-base sm:text-lg bg-transparent border-b border-gray-300 focus:border-indigo-600 focus:outline-none py-1 px-2 transition-colors" placeholder="예: OO병원 상반기 마케팅 견적">
                </div>
            </div>

            <div class="flex-1 overflow-x-auto mb-6">
                <table class="w-full text-left border-collapse min-w-[560px]">
                    <thead>
                        <tr class="bg-slate-50 border-y-2 border-slate-200 text-slate-600 text-sm tracking-wider">
                            <th class="py-3 px-4 font-semibold w-[48%]">항목 및 내용 (Description)</th>
                            <th class="py-3 px-4 font-semibold text-center w-[9%]">단위</th>
                            <th class="py-3 px-4 font-semibold text-right w-[18%]">단가 (Price)</th>
                            <th class="py-3 px-4 font-semibold text-center w-[10%]">수량 (Qty)</th>
                            <th class="py-3 px-4 font-semibold text-right w-[15%]">금액 (Total)</th>
                            <th class="py-3 px-2 w-10 action-col no-print"></th>
                        </tr>
                    </thead>
                    <tbody id="items-body" class="divide-y divide-slate-100">
                        <tr id="empty-state" class="no-print">
                            <td colspan="6" class="py-12 text-center text-slate-400">
                                좌측 메뉴에서 항목을 선택하거나 하단에서 직접 추가해주세요.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="flex justify-end mb-8 shrink-0">
                <div class="w-full md:w-[60%] bg-slate-50 p-5 rounded-lg border border-slate-200">
                    <div class="flex justify-between py-2 text-slate-600">
                        <span class="font-medium">공급가액 (Subtotal):</span>
                        <span id="subtotal" class="font-medium tracking-wide">₩0</span>
                    </div>
                    <div class="flex justify-between py-2 text-slate-600 border-b border-slate-200 pb-4">
                        <span class="font-medium">부가세 (VAT 10%):</span>
                        <span id="tax" class="font-medium tracking-wide">₩0</span>
                    </div>
                    <div class="flex justify-between pt-4 text-gray-900">
                        <span class="text-xl font-bold">총 합계 (Grand Total):</span>
                        <span id="grand-total" class="text-2xl font-bold text-indigo-600 tracking-tight">₩0</span>
                    </div>
                </div>
            </div>

            <!-- 하단 액션 버튼 -->
            <div class="flex flex-wrap gap-3 justify-between items-center border-t border-slate-200 pt-6 mt-auto shrink-0 no-print">
                <button onclick="addCustomRow()" class="text-indigo-600 hover:text-indigo-800 font-medium flex items-center gap-1 transition-colors px-4 py-2 hover:bg-indigo-50 rounded-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clip-rule="evenodd" />
                    </svg>
                    직접 빈 칸 추가
                </button>

                <button onclick="window.print()" class="bg-gray-800 hover:bg-gray-900 text-white font-semibold py-3 px-8 rounded-lg shadow-md transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                    </svg>
                    PDF로 저장 (Print)
                </button>
            </div>

        </div>
    </div>

    <div class="hidden print:block w-full bg-white">
        <div id="print-biz-container" class="page-break-always w-full min-h-[250mm] justify-center items-center pt-10" style="display: none;">
            <img id="biz-img-preview" src="" class="max-w-full object-contain" style="max-height: 250mm;" alt="사업자등록증">
        </div>
        <div id="print-bank-container" class="page-break-always w-full min-h-[250mm] justify-center items-center pt-10" style="display: none;">
            <img id="bank-img-preview" src="" class="max-w-full object-contain" style="max-height: 250mm;" alt="통장사본">
        </div>
    </div>

    <script>
        const dateOptions = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('ko-KR', dateOptions);

        // 협업용 단가 데이터 (모두 부가세 별도)
        const servicesData = [
            {
                category: "초기 세팅",
                items: [
                    { id: 'st1', name: "브랜딩 설문지 (브랜드 방향 설문 · 무료 제공)", unit: "식", price: 0, min: 1 },
                    { id: 'st2', name: "사전 촬영 (세미프로필 + 인터뷰 GIF, 첫 달 1회)", unit: "회", price: 300000, min: 1 },
                    { id: 'st3', name: "블로그 스킨 제작 (디자인 세팅, 1회)", unit: "회", price: 100000, min: 1 }
                ]
            },
            {
                category: "블로그",
                items: [
                    { id: 'bl1', name: "브랜드 블로그 (자사 계정 콘텐츠 작성 · 발행)", unit: "건", price: 60000, min: 10 },
                    { id: 'bl2', name: "블로그 배포 · 준최블로그 (콘텐츠 작성 후 타 계정 발행)", unit: "건", price: 80000, min: 1 },
                    { id: 'bl3', name: "블로그 배포 · 최적블로그 (콘텐츠 작성 후 타 계정 발행)", unit: "건", price: 130000, min: 1 },
                    { id: 'bl4', name: "블로그 관리 (스크랩 · 댓글 · 공유 · 체류시간 세팅)", unit: "개월", price: 65000, min: 1 }
                ]
            },
            {
                category: "네이버 플레이스",
                items: [
                    { id: 'pl1', name: "플레이스 예약자 리뷰 (월별 가이드 · 키워드 기획 제공)", unit: "건", price: 5000, min: 50 },
                    { id: 'pl2', name: "플레이스 블로그 리뷰 (월별 가이드 · 키워드 기획 제공)", unit: "건", price: 2000, min: 50 }
                ]
            },
            {
                category: "카페",
                items: [
                    { id: 'cf1', name: "카페 기획 및 배포 (콘텐츠 기획 · 작성 + 타 계정 발행)", unit: "건", price: 35000, min: 10 }
                ]
            },
            {
                category: "유튜브",
                items: [
                    { id: 'yt1', name: "유튜브 기획 (콘텐츠 기획 총괄, 최대 4편)", unit: "식", price: 500000, min: 1 },
                    { id: 'yt2', name: "유튜브 촬영", unit: "시간", price: 150000, min: 1 },
                    { id: 'yt3', name: "유튜브 편집 (1편, 7분 내외)", unit: "편", price: 300000, min: 1 },
                    { id: 'yt4', name: "유튜브 숏폼 클립 (클립용 숏폼 편집)", unit: "개", price: 50000, min: 1 }
                ]
            },
            {
                category: "디자인",
                items: [
                    { id: 'ds1', name: "이미지 제작", unit: "건", price: 65000, min: 1 }
                ]
            }
        ];

        function formatCurrency(num) {
            return '₩' + num.toLocaleString('ko-KR');
        }

        function renderServiceCatalog() {
            const container = document.getElementById('service-catalog');
            let html = '';

            servicesData.forEach((group) => {
                html += `
                    <div class="border-b border-slate-200 last:border-0">
                        <div class="bg-slate-50 px-5 py-3 border-b border-slate-100 sticky top-0 z-10 flex justify-between items-center">
                            <h3 class="font-bold text-slate-700 text-sm">${group.category}</h3>
                        </div>
                        <div class="divide-y divide-slate-100">
                `;

                group.items.forEach(item => {
                    const perLabel = item.unit === '식' ? '총액' : `1${item.unit}당`;
                    const minLabel = item.min > 1 ? ` · 최소 ${item.min}${item.unit}` : '';
                    html += `
                        <label class="flex items-center px-5 py-3 hover:bg-indigo-50/50 cursor-pointer transition-colors group">
                            <div class="flex-shrink-0 mr-3">
                                <input type="checkbox" id="cb-${item.id}" class="w-5 h-5 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500 cursor-pointer" onchange="toggleItem('${item.id}', ${JSON.stringify(item.name).replace(/"/g, '&quot;')}, '${item.unit}', ${item.price}, ${item.min}, this.checked)">
                            </div>
                            <div class="flex-grow min-w-0 pr-2">
                                <p class="text-sm font-medium text-slate-800 group-hover:text-indigo-700 transition-colors">${item.name}</p>
                                <p class="text-xs text-slate-400">${perLabel}${minLabel}</p>
                            </div>
                            <div class="flex-shrink-0 text-right whitespace-nowrap">
                                <p class="text-sm font-semibold text-slate-600 group-hover:text-indigo-600 transition-colors">${formatCurrency(item.price)}</p>
                            </div>
                        </label>
                    `;
                });

                html += `</div></div>`;
            });

            container.innerHTML = html;
        }

        function toggleItem(id, name, unit, price, min, isChecked) {
            const tbody = document.getElementById('items-body');
            const emptyState = document.getElementById('empty-state');

            if (isChecked) {
                if (emptyState) emptyState.style.display = 'none';

                const qtyDefault = min || 1;
                const tr = document.createElement('tr');
                tr.id = `row-${id}`;
                tr.className = 'group transition-colors hover:bg-slate-50';
                tr.innerHTML = `
                    <td class="py-2 px-4">
                        <input type="text" class="item-name w-full bg-transparent border border-transparent focus:border-indigo-300 focus:ring-0 rounded p-2 text-gray-800 transition-all font-medium" value="${name}">
                    </td>
                    <td class="py-2 px-2 text-center">
                        <input type="text" class="unit w-full bg-transparent border border-transparent focus:border-indigo-300 focus:ring-0 rounded p-1 text-center text-slate-500 text-sm transition-all max-w-[56px] mx-auto block" value="${unit}">
                    </td>
                    <td class="py-2 px-4">
                        <input type="number" class="price w-full bg-transparent border border-transparent focus:border-indigo-300 focus:ring-0 rounded p-2 text-right text-gray-800 transition-all" value="${price}" oninput="calculateRow(this)">
                    </td>
                    <td class="py-2 px-4">
                        <input type="number" class="qty w-full bg-transparent border border-slate-200 focus:border-indigo-400 focus:ring-0 rounded p-1 text-center text-gray-800 transition-all max-w-[70px] mx-auto block" value="${qtyDefault}" min="${min || 1}" oninput="calculateRow(this)">
                    </td>
                    <td class="py-2 px-4 text-right font-medium text-gray-800 row-total align-middle">
                        ${formatCurrency(price * qtyDefault)}
                    </td>
                    <td class="py-2 px-2 text-center action-col no-print align-middle">
                        <button onclick="removeRow('${id}')" class="text-slate-400 hover:text-red-500 hover:bg-red-50 p-1.5 rounded transition-colors opacity-0 group-hover:opacity-100" title="삭제">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            } else {
                const row = document.getElementById(`row-${id}`);
                if (row) row.remove();
                checkEmptyState();
            }
            calculateTotals();
        }

        function removeRow(id) {
            const row = document.getElementById(`row-${id}`);
            if (row) row.remove();

            const checkbox = document.getElementById(`cb-${id}`);
            if (checkbox) checkbox.checked = false;

            checkEmptyState();
            calculateTotals();
        }

        function addCustomRow() {
            const tbody = document.getElementById('items-body');
            const emptyState = document.getElementById('empty-state');
            if (emptyState) emptyState.style.display = 'none';

            const customId = 'custom-' + Date.now();
            const tr = document.createElement('tr');
            tr.id = `row-${customId}`;
            tr.className = 'group transition-colors hover:bg-slate-50 bg-indigo-50/30';
            tr.innerHTML = `
                <td class="py-2 px-4">
                    <input type="text" class="item-name w-full bg-white border border-indigo-200 focus:border-indigo-400 focus:ring-0 rounded p-2 text-gray-800 transition-all font-medium" placeholder="항목 내용을 직접 입력하세요">
                </td>
                <td class="py-2 px-2 text-center">
                    <input type="text" class="unit w-full bg-white border border-indigo-200 focus:border-indigo-400 focus:ring-0 rounded p-1 text-center text-slate-500 text-sm transition-all max-w-[56px] mx-auto block" placeholder="건">
                </td>
                <td class="py-2 px-4">
                    <input type="number" class="price w-full bg-white border border-indigo-200 focus:border-indigo-400 focus:ring-0 rounded p-2 text-right text-gray-800 transition-all" placeholder="0" value="" oninput="calculateRow(this)">
                </td>
                <td class="py-2 px-4">
                    <input type="number" class="qty w-full bg-white border border-indigo-200 focus:border-indigo-400 focus:ring-0 rounded p-1 text-center text-gray-800 transition-all max-w-[70px] mx-auto block" value="1" min="1" oninput="calculateRow(this)">
                </td>
                <td class="py-2 px-4 text-right font-medium text-gray-800 row-total align-middle">
                    ₩0
                </td>
                <td class="py-2 px-2 text-center action-col no-print align-middle">
                    <button onclick="removeRow('${customId}')" class="text-slate-400 hover:text-red-500 hover:bg-red-50 p-1.5 rounded transition-colors opacity-0 group-hover:opacity-100" title="삭제">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
            tr.querySelector('.item-name').focus();
        }

        function checkEmptyState() {
            const tbody = document.getElementById('items-body');
            const emptyState = document.getElementById('empty-state');
            const hasItems = Array.from(tbody.children).some(tr => tr.id !== 'empty-state');

            if (!hasItems && emptyState) {
                emptyState.style.display = 'table-row';
            }
        }

        function calculateRow(input) {
            const row = input.closest('tr');
            const price = parseFloat(row.querySelector('.price').value) || 0;
            const qty = parseFloat(row.querySelector('.qty').value) || 0;
            const total = price * qty;
            row.querySelector('.row-total').innerText = formatCurrency(total);
            calculateTotals();
        }

        function calculateTotals() {
            let subtotal = 0;
            const tbody = document.getElementById('items-body');

            Array.from(tbody.children).forEach(row => {
                if (row.id === 'empty-state' && row.style.display !== 'none') return;

                const priceInput = row.querySelector('.price');
                const qtyInput = row.querySelector('.qty');

                if(priceInput && qtyInput) {
                    const price = parseFloat(priceInput.value) || 0;
                    const qty = parseFloat(qtyInput.value) || 0;
                    subtotal += price * qty;
                }
            });

            const tax = Math.floor(subtotal * 0.1);
            const grandTotal = subtotal + tax;

            document.getElementById('subtotal').innerText = formatCurrency(subtotal);
            document.getElementById('tax').innerText = formatCurrency(tax);
            document.getElementById('grand-total').innerText = formatCurrency(grandTotal);
        }

        function previewImage(input, type) {
            const containerId = type === 'biz' ? 'print-biz-container' : 'print-bank-container';
            const imgId = type === 'biz' ? 'biz-img-preview' : 'bank-img-preview';
            const container = document.getElementById(containerId);
            const imgElement = document.getElementById(imgId);

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imgElement.src = e.target.result;
                    container.style.display = 'flex';
                };
                reader.readAsDataURL(input.files[0]);
            } else {
                imgElement.src = '';
                container.style.display = 'none';
            }
        }

        window.onload = function() {
            renderServiceCatalog();
        };
    </script>
</body>
</html>
